<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loans — ClinicManager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#0A3530">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>
    <main>
        <div class="container">
            <div class="app-container">
                <div id="cmFlashContainer"></div>
                
                <div class="row">
                    <div class="col-12">
                        <div class="d-flex justify-content-between align-items-center mb-3 border-bottom pb-2">
                            <div>
                                <h3 class="mb-0">💳 Loans</h3>
                                <small class="text-muted">Everyone with an active loan, from a consultation or a retail sale.</small>
                            </div>
                            <span class="badge bg-dark fs-6" id="loanCountBadge">Loading...</span>
                        </div>

                        <div class="mb-3">
                            <input type="text" id="loanSearchInput" class="form-control" placeholder="🔍 Search by patient name..." autocomplete="off">
                        </div>

                        <div id="noResultsMsg" class="text-center text-muted py-4" style="display: none;">
                            No loans match your search.
                        </div>

                        <div class="table-responsive">
                            <table class="table table-striped table-hover align-middle">
                                <thead class="table-dark">
                                    <tr>
                                        <th>Patient</th>
                                        <th class="text-end">Total (<span class="currency-symbol-header">MK</span>)</th>
                                        <th class="text-end">Paid (<span class="currency-symbol-header">MK</span>)</th>
                                        <th class="text-end">Balance (<span class="currency-symbol-header">MK</span>)</th>
                                        <th>Witness</th>
                                        <th>Due Date</th>
                                        <th class="text-end">Action</th>
                                    </tr>
                                </thead>
                                <tbody id="loansTableBody">
                                    <tr><td colspan="7" class="text-center text-muted py-4">Loading loans...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="/static/js/shell.js"></script>
    <script src="/static/js/outbox.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', async function () {
        const { authenticated } = await CMShell.init({ active: 'loans' });
        if (!authenticated) return;

        // Load currency first
        await loadCurrency();
        loadLoans();
        window.addEventListener('online', loadLoans);

        document.getElementById('loanSearchInput').addEventListener('input', function() {
            applyLoanSearch(this.value.trim().toLowerCase());
        });
    });

    let currentCurrency = { symbol: 'MK', subunit_ratio: 100 };

    async function loadCurrency() {
        try {
            const res = await fetch('/api/clinic/currency');
            if (res.ok) {
                currentCurrency = await res.json();
                // Update currency symbols on the page
                document.querySelectorAll('.currency-symbol-header')
                    .forEach(el => el.textContent = currentCurrency.symbol);
            }
        } catch (err) {
            console.error('Failed to load currency:', err);
        }
    }

    async function loadLoans() {
        try {
            const res = await fetch('/api/loans');
            if (!res.ok) throw new Error('bad response');
            const data = await res.json();
            renderLoans(data);
        } catch (err) {
            document.getElementById('loanCountBadge').textContent = 'Unable to load';
            document.getElementById('loansTableBody').innerHTML =
                '<tr><td colspan="7" class="text-center text-muted py-4">Unable to load loans. Check your connection.</td></tr>';
        }
    }

    function renderLoans(data) {
        const loans = data.loans || [];
        const tbody = document.getElementById('loansTableBody');
        const countBadge = document.getElementById('loanCountBadge');

        countBadge.textContent = `${loans.length} ${loans.length === 1 ? 'loan' : 'loans'} active`;

        if (loans.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted py-4">No active loans right now. 🎉</td></tr>';
            return;
        }

        tbody.innerHTML = loans.map(loan => {
            const displayName = loan.patient_name || '🏪 Retail Sale';
            const typeBadge = loan.is_retail
                ? '<span class="badge bg-success ms-1">Retail</span>'
                : '<span class="badge bg-primary ms-1">Consultation</span>';

            const dueCell = loan.due_date
                ? `<small class="${loan.is_overdue ? 'text-danger fw-bold' : 'text-muted'}">${cmEscapeHtml(loan.due_date)}${loan.is_overdue ? ' (overdue)' : ''}</small>`
                : '<small class="text-muted">No due date</small>';

            return `
                <tr data-name="${cmEscapeHtml((loan.patient_name || '🏪 retail sale').toLowerCase())}">
                    <td><strong>${cmEscapeHtml(displayName)}</strong>${typeBadge}</td>
                    <td class="text-end">${CMShell.formatCurrency(loan.total_fee,currentCurrency)}</td>
                    <td class="text-end">${CMShell.formatCurrency(loan.amount_paid,currentCurrency)}</td>
                    <td class="text-end text-danger fw-bold">${CMShell.formatCurrency(loan.balance,currentCurrency)}</td>
                    <td><small>${cmEscapeHtml(loan.witness || '—')}</small></td>
                    <td>${dueCell}</td>
                    <td class="text-end">
                        <a href="/static/pages/loan_details.html?visit_id=${loan.id}" class="btn btn-outline-info btn-sm">💳 View / Record Payment</a>
                    </td>
                </tr>
            `;
        }).join('');

        applyLoanSearch(document.getElementById('loanSearchInput').value.trim().toLowerCase());
    }

    function applyLoanSearch(query) {
        const rows = document.querySelectorAll('#loansTableBody tr[data-name]');
        const noResultsMsg = document.getElementById('noResultsMsg');
        let visibleCount = 0;

        rows.forEach((row) => {
            const matches = row.getAttribute('data-name').includes(query);
            row.style.display = matches ? '' : 'none';
            if (matches) visibleCount++;
        });

        noResultsMsg.style.display = (visibleCount === 0 && query.length > 0) ? 'block' : 'none';
    }

    function cmEscapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str || '';
        return div.innerHTML;
    }
    </script>
</body>
</html>
