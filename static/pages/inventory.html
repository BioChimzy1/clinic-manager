<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory — ClinicManager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#0A3530">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>
    <main>
        <div class="container">
            <div class="app-container">
                <div id="cmFlashContainer"></div>
                
                <div class="row">
                    <div class="col-12 mb-4">
                        <div class="d-flex justify-content-between align-items-center mb-3 border-bottom pb-2">
                            <h4 class="mb-0 text-dark">Clinic Inventory</h4>
                            <div class="btn-group" id="actionButtons">
                                <button class="btn btn-success btn-sm" type="button" id="openAddBtn">➕ Add Stock</button>
                                <button class="btn btn-primary btn-sm" type="button" id="openEditBtn">✏️ Edit Stock</button>
                            </div>
                        </div>

                        <div class="mb-3" id="staleBanner" style="display: none;"></div>

                        <div class="collapse mb-4" id="addInventoryForm">
                            <div class="card card-body bg-light border position-relative">
                                <button type="button" class="btn-close position-absolute top-0 end-0 m-2" data-bs-toggle="collapse" data-bs-target="#addInventoryForm"></button>
                                <h5 class="mb-3" id="formModeTitle">
                                    <span class="text-success" id="addModeTitle">➕ Add New Inventory Item</span>
                                    <span class="text-primary" id="editModeTitle" style="display: none;">✏️ Editing: <span id="editingItemName"></span></span>
                                </h5>

                                <div class="alert alert-primary d-flex justify-content-between align-items-center py-2 mb-3" id="editingBanner" style="display: none;">
                                    <span>You're editing an existing item. Change anything below — name, category, quantity to add, alert level, or expiry — then press Update.</span>
                                    <button type="button" class="btn btn-sm btn-outline-secondary ms-2" id="cancelEditBtn">Cancel / New Item</button>
                                </div>

                                <form id="inventoryForm">
                                    <input type="hidden" name="inventory_id" id="inventoryIdInput" value="">

                                    <div class="mb-3" style="position: relative;">
                                        <label class="form-label fw-bold">Item Name</label>
                                        <input type="text" name="item_name" id="itemNameInput" class="form-control" placeholder="e.g. Amoxicillin 500mg" autocomplete="off" required>
                                        <div id="results" class="bg-white border rounded shadow-sm" style="display: none; position: absolute; width: 100%; max-height: 200px; overflow-y: auto; z-index: 1050; top: 100%; left: 0; margin-top: 2px;"></div>
                                        <small class="text-muted" id="nameHint" style="display: none;"></small>
                                    </div>

                                    <div class="mb-3">
                                        <label class="form-label fw-bold">Category</label>
                                        <select name="category" id="categorySelect" class="form-select" required>
                                            <option value="Pharmacy">Pharmacy (Drugs)</option>
                                            <option value="Laboratory">Laboratory (Test Kits)</option>
                                            <option value="Medical Supply">Medical Supply</option>
                                            <option value="Other">Other</option>
                                        </select>
                                    </div>

                                    <div class="mb-3">
                                        <label class="form-label fw-bold" id="qtyLabel">Quantity</label>
                                        <input type="number" name="quantity" id="quantityInput" class="form-control" placeholder="Enter quantity" min="0" required>
                                        <small class="text-muted" id="qtyHint" style="display: none;"></small>
                                    </div>

                                    <div class="mb-3">
                                        <label class="form-label fw-bold">Low Alert Level</label>
                                        <input type="number" name="min_alert_level" id="alertInput" class="form-control" value="100" required>
                                    </div>

                                    <div class="mb-3">
                                        <label class="form-label fw-bold">Expiry Date</label>
                                        <input type="date" name="expiry_date" id="expiryInput" class="form-control" required>
                                    </div>

                                    <div class="d-grid gap-2">
                                        <button type="submit" id="addBtn" class="btn btn-success w-100">➕ Add New Item</button>
                                        <button type="submit" id="editBtn" class="btn btn-primary w-100" style="display: none;">✏️ Update Item</button>
                                    </div>
                                </form>
                            </div>
                        </div>

                        <div class="mb-3">
                            <input type="text" id="inventorySearchInput" class="form-control" placeholder="🔍 Search by item name..." autocomplete="off">
                        </div>

                        <div id="noInventoryResultsMsg" class="text-center text-muted py-4" style="display: none;">
                            No items match your search.
                        </div>

                        <div class="table-responsive">
                            <table class="table table-striped align-middle">
                                <thead class="table-dark">
                                    <tr>
                                        <th>Category</th>
                                        <th>Item Name</th>
                                        <th>Qty</th>
                                        <th>Expiry</th>
                                        <th>Stock</th>
                                        <th>Expiry Status</th>
                                        <th class="text-end">Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="inventoryTableBody">
                                    <tr><td colspan="7" class="text-center text-muted py-4">Loading...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="/static/js/shell.js"></script>
    <script src="/static/js/outbox.js"></script>
    <script>
    let isOfflineMode = false;
    let allItems = [];
    let isEditing = false;
    let editIntent = false;

    let nameInput, results, catSelect, alertInput, expiryInput, qtyInput, invIdInput;
    let addBtn, editBtn, nameHint, qtyLabel, qtyHint, addModeTitle, editModeTitle;
    let editingItemName, editingBanner, cancelEditBtn, formElement;

    document.addEventListener('DOMContentLoaded', async function () {
        const { authenticated } = await CMShell.init({ active: 'inventory' });
        if (!authenticated) return;

        nameInput = document.getElementById('itemNameInput');
        results = document.getElementById('results');
        catSelect = document.getElementById('categorySelect');
        alertInput = document.getElementById('alertInput');
        expiryInput = document.getElementById('expiryInput');
        qtyInput = document.getElementById('quantityInput');
        invIdInput = document.getElementById('inventoryIdInput');
        addBtn = document.getElementById('addBtn');
        editBtn = document.getElementById('editBtn');
        nameHint = document.getElementById('nameHint');
        qtyLabel = document.getElementById('qtyLabel');
        qtyHint = document.getElementById('qtyHint');
        addModeTitle = document.getElementById('addModeTitle');
        editModeTitle = document.getElementById('editModeTitle');
        editingItemName = document.getElementById('editingItemName');
        editingBanner = document.getElementById('editingBanner');
        cancelEditBtn = document.getElementById('cancelEditBtn');
        formElement = document.getElementById('addInventoryForm');

        document.getElementById('openAddBtn').addEventListener('click', openInAddMode);
        document.getElementById('openEditBtn').addEventListener('click', openInEditShell);
        cancelEditBtn.addEventListener('click', resetForm);

        document.getElementById('inventorySearchInput').addEventListener('input', function() {
            applyInventorySearch(this.value.trim().toLowerCase());
        });

        nameInput.addEventListener('input', handleAutocomplete);

        document.addEventListener('click', (e) => {
            if (!results.contains(e.target) && e.target !== nameInput) {
                closeResults();
            }
        });

        formElement.addEventListener('hidden.bs.collapse', resetForm);

        document.getElementById('inventoryForm').addEventListener('submit', handleInventorySubmit);

        loadInventory();
        window.addEventListener('online', loadInventory);
    });

    function closeResults() {
        results.style.display = 'none';
        results.innerHTML = '';
    }

    function switchToEditMode(id, name, category, qty, alert, expiry) {
        isEditing = true;
        editIntent = false;

        nameInput.value = name;
        catSelect.value = category;
        alertInput.value = alert;
        expiryInput.value = expiry;
        qtyInput.value = '';
        invIdInput.value = id;

        editingItemName.textContent = name;
        addModeTitle.style.display = 'none';
        editModeTitle.style.display = 'inline';
        editingBanner.style.display = 'flex';

        nameHint.style.display = 'block';
        nameHint.textContent = 'Editing existing item — you can rename, change category, or update expiry here.';

        qtyLabel.textContent = 'Add to Current Stock (leave 0 if not restocking)';
        qtyHint.style.display = 'block';
        qtyHint.textContent = `Current quantity in stock: ${qty}. Enter how many units to ADD. Leave 0 to only edit details.`;

        addBtn.style.display = 'none';
        editBtn.style.display = 'block';

        closeResults();
    }

    function switchToAddMode() {
        isEditing = false;
        editIntent = false;

        invIdInput.value = '';
        editingItemName.textContent = '';
        addModeTitle.style.display = 'inline';
        editModeTitle.style.display = 'none';
        editingBanner.style.display = 'none';

        nameHint.style.display = 'none';
        qtyLabel.textContent = 'Quantity';
        qtyHint.style.display = 'none';

        addBtn.style.display = 'block';
        editBtn.style.display = 'none';
    }

    function resetForm() {
        switchToAddMode();
        nameInput.value = '';
        catSelect.value = 'Pharmacy';
        alertInput.value = '100';
        expiryInput.value = '';
        qtyInput.value = '';
        closeResults();
    }

    function openInAddMode() {
        resetForm();
        const formCollapse = new bootstrap.Collapse(document.getElementById('addInventoryForm'), { toggle: false });
        formCollapse.show();
        nameInput.focus();
    }

    function openInEditShell() {
        resetForm();
        editIntent = true;

        addModeTitle.style.display = 'none';
        editModeTitle.style.display = 'inline';
        editingItemName.textContent = '(search below to choose an item)';

        editingBanner.style.display = 'flex';
        nameHint.style.display = 'block';
        nameHint.textContent = 'Type a drug name and click it below to start editing.';

        addBtn.style.display = 'none';
        editBtn.style.display = 'none';

        const formCollapse = new bootstrap.Collapse(document.getElementById('addInventoryForm'), { toggle: false });
        formCollapse.show();
        nameInput.focus();
    }

    function handleAutocomplete() {
        const query = this.value.trim();

        if (editIntent && !isEditing) {
            closeResults();
            if (query.length === 0) return;

            const matches = allItems.filter(item => item.name.toLowerCase().includes(query.toLowerCase()));

            if (matches.length === 0) {
                results.innerHTML = '<div class="p-3 text-muted small">No matching item found. Use "Add Stock" if this is a new item.</div>';
                results.style.display = 'block';
                return;
            }

            matches.forEach((item) => {
                const div = document.createElement('div');
                div.className = 'p-2 border-bottom bg-white';
                div.style.cursor = 'pointer';
                div.innerHTML = `<strong>${cmEscapeHtml(item.name)}</strong> <small class="text-muted">(${cmEscapeHtml(item.category)}, exp ${item.expiry})</small>`;
                div.addEventListener('click', () => {
                    switchToEditMode(item.id, item.name, item.category, item.qty, item.alert, item.expiry);
                });
                results.appendChild(div);
            });
            results.style.display = 'block';
            return;
        }

        if (isEditing) {
            closeResults();
            if (query.length === 0) return;

            const matches = allItems.filter(item =>
                item.name.toLowerCase().includes(query.toLowerCase()) &&
                item.id !== invIdInput.value
            );

            if (matches.length > 0) {
                matches.forEach((item) => {
                    const div = document.createElement('div');
                    div.className = 'p-2 border-bottom bg-white';
                    div.style.cursor = 'pointer';
                    div.innerHTML = `<small class="text-muted">Switch to editing:</small> <strong>${cmEscapeHtml(item.name)}</strong> <small class="text-muted">(${cmEscapeHtml(item.category)})</small>`;
                    div.addEventListener('click', () => {
                        switchToEditMode(item.id, item.name, item.category, item.qty, item.alert, item.expiry);
                    });
                    results.appendChild(div);
                });
                results.style.display = 'block';
            }
            return;
        }

        if (query.length === 0) {
            closeResults();
            return;
        }

        const matches = allItems.filter(item => item.name.toLowerCase().includes(query.toLowerCase()));
        results.innerHTML = '';

        if (matches.length === 0) {
            results.innerHTML = '<div class="p-3 text-muted small">New item. Will be created.</div>';
            results.style.display = 'block';
            return;
        }

        const note = document.createElement('div');
        note.className = 'p-2 small text-muted border-bottom bg-light';
        note.textContent = 'Already in stock with these expiry dates — pick a different expiry to add it as a new batch:';
        results.appendChild(note);

        matches.forEach((item) => {
            const div = document.createElement('div');
            div.className = 'p-2 border-bottom bg-white';
            div.style.cursor = 'pointer';
            div.innerHTML = `<strong>${cmEscapeHtml(item.name)}</strong> <small class="text-muted">(${cmEscapeHtml(item.category)}, exp ${item.expiry})</small>`;
            div.addEventListener('click', () => {
                nameInput.value = item.name;
                catSelect.value = item.category;
                closeResults();
            });
            results.appendChild(div);
        });

        results.style.display = 'block';
    }

    async function handleInventorySubmit(e) {
        e.preventDefault();
        const formData = new FormData(this);
        const data = {};
        formData.forEach((value, key) => { data[key] = value; });

        const isEdit = isEditing;
        const endpoint = isEdit ? '/api/inventory/edit/' + data.inventory_id : '/api/inventory/add';
        const method = 'POST';

        const btn = isEdit ? editBtn : addBtn;
        btn.disabled = true;
        btn.textContent = isEdit ? 'Updating...' : 'Adding...';

        try {
            const res = await fetch(endpoint, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await res.json();
            if (result.success) {
                resetForm();
                bootstrap.Collapse.getInstance(document.getElementById('addInventoryForm')).hide();
                loadInventory();
            } else {
                alert('Error: ' + (result.error || 'Operation failed'));
                btn.disabled = false;
                btn.textContent = isEdit ? '✏️ Update Item' : '➕ Add New Item';
            }
        } catch (err) {
            alert('Network error. Please try again.');
            btn.disabled = false;
            btn.textContent = isEdit ? '✏️ Update Item' : '➕ Add New Item';
        }
    }

    async function loadInventory() {
        const tbody = document.getElementById('inventoryTableBody');
        try {
            const res = await fetch('/api/inventory');
            if (!res.ok) throw new Error('bad response');
            const data = await res.json();
            await cmSaveInventorySnapshot(data);

            if (data.items) {
                allItems = data.items.map(item => ({
                    id: item.id,
                    name: item.name,
                    category: item.category,
                    alert: item.min_alert,
                    expiry: item.expiry,
                    qty: item.qty
                }));
            }

            renderInventory(data, false);
        } catch (err) {
            const cached = await cmGetInventorySnapshot();
            if (cached) {
                if (cached.items) {
                    allItems = cached.items.map(item => ({
                        id: item.id,
                        name: item.name,
                        category: item.category,
                        alert: item.min_alert,
                        expiry: item.expiry,
                        qty: item.qty
                    }));
                }
                renderInventory(cached, true);
            } else {
                tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted py-4">No cached inventory yet. Connect once to load it.</td></tr>';
            }
        }
    }

    function renderInventory(data, isStale) {
        const tbody = document.getElementById('inventoryTableBody');
        const banner = document.getElementById('staleBanner');
        const actionBtns = document.getElementById('actionButtons');

        isOfflineMode = isStale;

        if (isStale) {
            const when = new Date(data.fetched_at).toLocaleString();
            banner.className = 'alert alert-warning py-2 px-3 mb-3';
            banner.innerHTML = `⏳ As of ${when} — go online to see current stock levels and take actions.`;
            banner.style.display = 'block';

            actionBtns.querySelectorAll('button').forEach(btn => {
                btn.disabled = true;
                btn.title = 'Connect to the internet to manage stock';
            });

            if (addBtn) {
                addBtn.disabled = true;
                addBtn.title = 'Connect to the internet to save changes';
            }
            if (editBtn) {
                editBtn.disabled = true;
                editBtn.title = 'Connect to the internet to save changes';
            }
        } else {
            banner.style.display = 'none';
            actionBtns.querySelectorAll('button').forEach(btn => {
                btn.disabled = false;
                btn.title = '';
            });

            if (addBtn) {
                addBtn.disabled = false;
                addBtn.title = '';
            }
            if (editBtn) {
                editBtn.disabled = false;
                editBtn.title = '';
            }
        }

        const items = data.items || [];
        if (items.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted py-4">No stock in inventory yet.</td></tr>';
            return;
        }

        tbody.innerHTML = items.map(item => renderInventoryRow(item, data.today, data.expiry_cutoff)).join('');

        const searchInput = document.getElementById('inventorySearchInput');
        if (searchInput) {
            applyInventorySearch(searchInput.value.trim().toLowerCase());
        }

        attachInventoryRowHandlers();
    }

    function renderInventoryRow(item, todayStr, cutoffStr) {
        let stockBadge = '';
        if (item.qty == 0) {
            stockBadge = '<span class="badge" style="background-color: #212529;">🚫 Out of Stock</span>';
        } else if (item.qty <= item.min_alert) {
            stockBadge = '<span class="badge bg-danger">⚠️ Low Stock</span>';
        } else {
            stockBadge = '<span class="badge bg-success">✅ Healthy</span>';
        }

        let expiryBadge = '';
        if (item.expiry && item.expiry < todayStr) {
            expiryBadge = '<span class="badge" style="background-color: #6f0000;">⛔ Expired</span>';
        } else if (item.expiry && item.expiry <= cutoffStr) {
            expiryBadge = '<span class="badge bg-warning text-dark">⏳ Expiring Soon</span>';
        } else {
            expiryBadge = '<span class="badge bg-success">✅ OK</span>';
        }

        const actions = isOfflineMode
            ? `<span class="text-muted small">🔒 Offline — view only</span>`
            : `
                <button class="btn btn-outline-primary btn-sm py-0 px-2 inline-edit-btn mb-1"
                        data-id="${item.id}" data-name="${cmEscapeHtml(item.name)}"
                        data-category="${cmEscapeHtml(item.category)}" data-qty="${item.qty}"
                        data-alert="${item.min_alert}" data-expiry="${item.expiry}"
                        style="font-size: 0.75rem;">✏️ Edit</button>
                <br>
                <button class="btn btn-outline-danger btn-sm py-0 px-2 clear-stock-btn"
                        data-id="${item.id}" data-name="${cmEscapeHtml(item.name)}"
                        data-qty="${item.qty}" data-expiry="${item.expiry}"
                        style="font-size: 0.75rem;">🗑️ Clear</button>
            `;

        return `
            <tr data-name="${cmEscapeHtml(item.name.toLowerCase())}">
                <td><span class="badge bg-secondary">${cmEscapeHtml(item.category)}</span></td>
                <td><strong>${cmEscapeHtml(item.name)}</strong></td>
                <td>${CMShell.formatNumber(item.qty)}</td>
                <td><small class="text-muted">${item.expiry || ''}</small></td>
                <td>${stockBadge}</td>
                <td>${expiryBadge}</td>
                <td class="text-end">${actions}</td>
            </tr>
        `;
    }

    function applyInventorySearch(query) {
        const rows = document.querySelectorAll('#inventoryTableBody tr[data-name]');
        const noResultsMsg = document.getElementById('noInventoryResultsMsg');
        let visibleCount = 0;

        rows.forEach((row) => {
            const matches = row.getAttribute('data-name').includes(query);
            row.style.display = matches ? '' : 'none';
            if (matches) visibleCount++;
        });

        noResultsMsg.style.display = (visibleCount === 0 && query.length > 0 && rows.length > 0) ? 'block' : 'none';
    }

    function attachInventoryRowHandlers() {
        document.querySelectorAll('.inline-edit-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const id = this.dataset.id;
                const name = this.dataset.name;
                const category = this.dataset.category;
                const qty = this.dataset.qty;
                const alert = this.dataset.alert;
                const expiry = this.dataset.expiry;

                switchToEditMode(id, name, category, qty, alert, expiry);

                const formCollapse = new bootstrap.Collapse(document.getElementById('addInventoryForm'), { toggle: false });
                formCollapse.show();
                document.getElementById('addInventoryForm').scrollIntoView({ behavior: 'smooth' });
            });
        });

        document.querySelectorAll('.clear-stock-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                if (isOfflineMode) {
                    alert("Inventory management is unavailable while offline.");
                    return;
                }
                const id = this.dataset.id;
                const name = this.dataset.name;
                const currentQty = parseInt(this.dataset.qty, 10);
                const expiry = this.dataset.expiry;

                const input = prompt(
                    `Remove how many units of "${name}" (exp ${expiry})?\n` +
                    `Currently in stock: ${currentQty}.\n` +
                    `Leave as-is to clear all ${currentQty} units, or type a smaller number for a partial removal.`,
                    currentQty
                );

                if (input === null) return;

                const amount = parseInt(input, 10);

                if (isNaN(amount) || amount <= 0) {
                    alert('Please enter a number greater than 0.');
                    return;
                }
                if (amount > currentQty) {
                    alert(`Cannot remove ${amount} -- only ${currentQty} in stock.`);
                    return;
                }

                if (!confirm(`Remove ${amount} unit(s) of "${name}"? This cannot be undone.`)) {
                    return;
                }

                fetch('/api/inventory/reduce/' + id, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ amount: amount })
                })
                .then(response => response.json())
                .then(async data => {
                    if (data.success) {
                        await loadInventory();
                    } else {
                        alert('Error: ' + (data.error || 'Could not remove stock.'));
                    }
                })
                .catch(() => {
                    alert('Network error -- could not remove stock.');
                });
            });
        });
    }

    function cmEscapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str || '';
        return div.innerHTML;
    }
    </script>
</body>
</html>
