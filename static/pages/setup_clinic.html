<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup Clinic — ClinicManager</title>
    <link href="/static/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#0A3530">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>
    <main>
        <div class="container">
            <div class="app-container">
                <div id="cmFlashContainer"></div>
                
                <div class="row mx-auto" style="max-width: 600px;">
                    <div class="col-12">
                        <div class="text-center mb-4">
                            <h2 class="text-success">🏥 Welcome to ClinicManager!</h2>
                            <p class="text-muted">It looks like this is your first time here. Let's set up your clinic.</p>
                        </div>

                        <div class="card shadow-sm">
                            <div class="card-header bg-dark text-white">
                                <h5 class="mb-0">Create Your Clinic</h5>
                            </div>
                            <div class="card-body">
                                <form id="setupClinicForm">
                                    <div class="mb-3">
                                        <label class="form-label fw-bold">Clinic Name <span class="text-danger">*</span></label>
                                        <input type="text" name="clinic_name" class="form-control" placeholder="e.g. Mwai Clinic" required>
                                    </div>

                                    <div class="mb-3">
                                        <label class="form-label fw-bold">Phone Number</label>
                                        <input type="text" name="phone" class="form-control" placeholder="e.g. 0992528659">
                                    </div>

                                    <div class="mb-3">
                                        <label class="form-label fw-bold">Email Address</label>
                                        <input type="email" name="email" class="form-control" placeholder="e.g. clinic@gmail.com">
                                    </div>

                                    <div class="mb-4">
                                        <label class="form-label fw-bold">Clinic Address</label>
                                        <input type="text" name="address" class="form-control" placeholder="e.g. Mkwalula, Lilongwe">
                                    </div>

                                    <button type="submit" class="btn btn-success w-100">🏥 Create Clinic & Start Managing</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="/static/js/shell.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', async function () {
        // This page requires authentication but no nav (handled by shell.js)
        const { authenticated } = await CMShell.init({ active: 'setup_clinic' });
        if (!authenticated) return;

        document.getElementById('setupClinicForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            const data = {};
            formData.forEach((value, key) => { data[key] = value; });

            const btn = this.querySelector('button[type="submit"]');
            btn.disabled = true;
            btn.textContent = 'Creating...';

            try {
                const res = await fetch('/api/clinics/setup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await res.json();
                if (result.success) {
                    window.location.href = '/dashboard';
                } else {
                    alert('Error: ' + (result.error || 'Could not create clinic'));
                    btn.disabled = false;
                    btn.textContent = '🏥 Create Clinic & Start Managing';
                }
            } catch (err) {
                alert('Network error. Please try again.');
                btn.disabled = false;
                btn.textContent = '🏥 Create Clinic & Start Managing';
            }
        });
    });
    </script>
</body>
</html>
