<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ClinicManager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#0A3530">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --teal: #0F4C46;
            --teal-deep: #0A3530;
            --cream: #FAF7F2;
            --cream-dim: #F0EBE1;
            --terracotta: #E8743B;
            --terracotta-deep: #C85A24;
            --charcoal: #2B2B28;
            --charcoal-soft: #5A5650;
        }
        * { box-sizing: border-box; }
        body {
            background: var(--cream);
            color: var(--charcoal);
            font-family: 'Inter', system-ui, sans-serif;
            -webkit-font-smoothing: antialiased;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .serif { font-family: 'Fraunces', Georgia, serif; }
        .login-card {
            max-width: 400px;
            width: 100%;
            background: var(--cream-dim);
            border: none;
            border-radius: 16px;
            padding: 2.5rem 2rem;
            box-shadow: 0 8px 40px rgba(15,76,70,0.12);
        }
        .brand-mark {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            font-family: 'Fraunces', Georgia, serif;
            font-weight: 600;
            font-size: 1.4rem;
            color: var(--teal-deep);
            margin-bottom: 0.5rem;
        }
        .brand-mark .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--terracotta);
            display: inline-block;
        }
        .login-subtitle {
            text-align: center;
            color: var(--charcoal-soft);
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }
        .form-label {
            font-weight: 600;
            color: var(--charcoal);
            font-size: 0.9rem;
        }
        .form-control {
            background: var(--cream);
            border: 1.5px solid rgba(15,76,70,0.12);
            border-radius: 10px;
            padding: 0.75rem 1rem;
            font-size: 0.95rem;
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
        }
        .form-control:focus {
            border-color: var(--terracotta);
            box-shadow: 0 0 0 0.25rem rgba(232,116,59,0.15);
        }
        .btn-login {
            background: var(--terracotta);
            border: none;
            color: white;
            font-weight: 600;
            padding: 0.75rem;
            border-radius: 10px;
            font-size: 1rem;
            width: 100%;
            transition: background 0.15s ease, transform 0.15s ease;
        }
        .btn-login:hover {
            background: var(--terracotta-deep);
            transform: translateY(-1px);
            color: white;
        }
        .btn-login:disabled {
            opacity: 0.65;
            transform: none;
        }
        .alert-danger {
            background: rgba(200,90,90,0.1);
            border-color: #c85a5a;
            color: #8a3a3a;
            border-radius: 10px;
        }
        .footer-note {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: var(--charcoal-soft);
        }
        .footer-note a {
            color: var(--teal-deep);
            font-weight: 600;
        }
        .footer-note a:hover {
            color: var(--terracotta-deep);
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="brand-mark">
            <span class="dot"></span>ClinicManager
        </div>
        <p class="login-subtitle">Staff Login</p>

        <div id="loginError" class="alert alert-danger" style="display:none;"></div>

        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Enter username" required autofocus>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Enter password" required>
            </div>
            <button type="submit" id="loginBtn" class="btn-login">Log in</button>
        </form>

        <div class="footer-note">
            <a href="/">&larr; Back to home</a>
        </div>
    </div>

    <!-- Combined JS -->
    <script src="/static/js/shell.js"></script>
    <script>
    (async function () {
        await CMShell.init({ active: 'login' });

        const form = document.getElementById('loginForm');
        const btn = document.getElementById('loginBtn');
        const errorBox = document.getElementById('loginError');

        form.addEventListener('submit', async function (e) {
            e.preventDefault();
            errorBox.style.display = 'none';
            btn.disabled = true;
            btn.textContent = 'Signing in...';

            const payload = {
                username: form.username.value.trim(),
                password: form.password.value
            };

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();

                if (data.success) {
                    if (data.needs_clinic) {
                        window.location.href = '/setup_clinic';
                    } else if (data.needs_clinic_selection) {
                        window.location.href = '/select_clinic';
                    } else {
                        window.location.href = '/dashboard';
                    }
                } else {
                    errorBox.textContent = data.error || 'Invalid username or password';
                    errorBox.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'Log in';
                }
            } catch (err) {
                errorBox.textContent = 'Network error. Please try again.';
                errorBox.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Log in';
            }
        });
    })();
    </script>
</body>
</html>
