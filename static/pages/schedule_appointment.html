<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule Appointment — ClinicManager</title>
    <link href="/static/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#0A3530">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>
    <main>
        <div class="container">
            <div class="app-container">
                <div id="cmFlashContainer"></div>
                
                <div class="row mx-auto" style="max-width: 600px;">
                    <div class="col-12">
                        <h3 class="mb-4 text-dark border-bottom pb-2">📅 Schedule Appointment</h3>
                        <form id="scheduleForm">
                            <div class="mb-3">
                                <label class="form-label fw-bold">Patient</label>
                                <select name="patient_id" id="patientSelect" class="form-select">
                                    <option value="">-- Select Existing Patient --</option>
                                </select>
                                <div class="mt-2 text-center text-muted">OR</div>
                            </div>

                            <div class="card bg-light mb-3 p-3">
                                <h6>Register New Patient</h6>
                                <div class="mb-2">
                                    <label class="form-label small text-muted mb-1">Full Name</label>
                                    <input type="text" name="new_name" class="form-control" placeholder="e.g. Bio Chimzy">
                                </div>
                                <div class="row mb-2">
                                    <div class="col-6">
                                        <label class="form-label small text-muted mb-1">Date of Birth</label>
                                        <input type="date" name="new_dob" class="form-control">
                                    </div>
                                    <div class="col-6">
                                        <label class="form-label small text-muted mb-1">Sex</label>
                                        <select name="new_sex" class="form-select">
                                            <option value="Male">Male</option>
                                            <option value="Female">Female</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="mb-2">
                                    <label class="form-label small text-muted mb-1">Phone Number</label>
                                    <input type="text" name="new_phone" class="form-control" placeholder="099xxxxxxx">
                                </div>
                                <div>
                                    <label class="form-label small text-muted mb-1">Location / Area</label>
                                    <input type="text" name="new_location" class="form-control" placeholder="e.g. Mkwalula">
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Appointment Date & Time</label>
                                <input type="datetime-local" name="appointment_date" class="form-control" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Reason</label>
                                <input type="text" name="reason" class="form-control" placeholder="e.g. Follow-up, Malaria test">
                            </div>

                            <div class="d-flex gap-2">
                                <a href="/appointments" class="btn btn-secondary">Cancel</a>
                                <button type="submit" class="btn btn-success w-100">Schedule Appointment</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="/static/js/shell.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', async function () {
        const { authenticated } = await CMShell.init({ active: 'schedule_appointment' });
        if (!authenticated) return;

        // Load patients
        try {
            const res = await fetch('/api/patients');
            if (res.ok) {
                const data = await res.json();
                const select = document.getElementById('patientSelect');
                data.patients.forEach(p => {
                    const opt = document.createElement('option');
                    opt.value = p.id;
                    opt.textContent = p.name + (p.phone ? ' (' + p.phone + ')' : '');
                    select.appendChild(opt);
                });
            }
        } catch (err) {
            console.error('Failed to load patients:', err);
        }

        // Form submit
        document.getElementById('scheduleForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            const data = {};
            formData.forEach((value, key) => { data[key] = value; });

            const btn = this.querySelector('button[type="submit"]');
            btn.disabled = true;
            btn.textContent = 'Scheduling...';

            try {
                const res = await fetch('/api/appointments/schedule', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await res.json();
                if (result.success) {
                    window.location.href = '/appointments';
                } else {
                    alert('Error: ' + (result.error || 'Could not schedule appointment'));
                    btn.disabled = false;
                    btn.textContent = 'Schedule Appointment';
                }
            } catch (err) {
                alert('Network error. Please try again.');
                btn.disabled = false;
                btn.textContent = 'Schedule Appointment';
            }
        });
    });
    </script>
</body>
</html>
