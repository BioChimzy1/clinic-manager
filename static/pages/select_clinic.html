<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Clinic — ClinicManager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#0A3530">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --teal: #0F4C46;
            --teal-deep: #0A3530;
            --cream: #FAF7F2;
            --cream-dim: #F0EBE1;
            --terracotta: #E8743B;
            --terracotta-deep: #C85A24;
            --charcoal: #2B2B28;
            --charcoal-soft: #5A5650;
        }
        * { box-sizing: border-box; }
        body {
            background: var(--cream);
            color: var(--charcoal);
            font-family: 'Inter', system-ui, sans-serif;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        main { flex: 1; padding: 3rem 0; }
        .app-container {
            max-width: 500px;
            margin: 0 auto;
            background: var(--cream-dim);
            border-radius: 16px;
            padding: 2.5rem 2rem;
            box-shadow: 0 8px 40px rgba(15,76,70,0.12);
        }
        .serif { font-family: 'Fraunces', Georgia, serif; }
        .brand-mark {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            font-family: 'Fraunces', Georgia, serif;
            font-weight: 600;
            font-size: 1.4rem;
            color: var(--teal-deep);
            margin-bottom: 0.5rem;
        }
        .brand-mark .dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            background: var(--terracotta);
            display: inline-block;
        }
        .form-label { font-weight: 600; color: var(--charcoal); }
        .form-select:focus, .form-control:focus {
            border-color: var(--terracotta);
            box-shadow: 0 0 0 0.25rem rgba(232,116,59,0.15);
        }
        .btn-primary {
            background: var(--terracotta) !important;
            border: none !important;
            color: white !important;
            font-weight: 600;
            padding: 0.75rem;
            border-radius: 10px;
            font-size: 1rem;
            width: 100%;
            transition: background 0.15s ease, transform 0.15s ease;
        }
        .btn-primary:hover { background: var(--terracotta-deep) !important; transform: translateY(-1px); color: white !important; }
        .btn-secondary {
            background: var(--teal-deep) !important;
            border: none !important;
            color: var(--cream) !important;
        }
        .btn-secondary:hover { background: var(--teal) !important; color: var(--cream) !important; }
        .btn-outline-danger {
            border-color: var(--charcoal-soft) !important;
            color: var(--charcoal-soft) !important;
        }
        .btn-outline-danger:hover { background: #c85a5a !important; color: white !important; border-color: #c85a5a !important; }
        .footer-note { text-align: center; margin-top: 1.5rem; font-size: 0.85rem; color: var(--charcoal-soft); }
        .footer-note a { color: var(--teal-deep); font-weight: 600; text-decoration: none; }
        .footer-note a:hover { color: var(--terracotta-deep); }
    </style>
</head>
<body>
    <main>
        <div class="app-container">
            <div class="brand-mark">
                <span class="dot"></span>ClinicManager
            </div>
            <h3 class="text-center mb-3">🏥 Select Clinic</h3>
            
            <div id="clinicSelectionContainer">
                <p class="text-muted text-center">You are assigned to multiple clinics. Choose which one to work in today.</p>
                
                <form id="selectClinicForm">
                    <div class="mb-4">
                        <label class="form-label fw-bold">Clinic</label>
                        <select name="clinic_id" id="clinicSelect" class="form-select" required>
                            <option value="">-- Select a clinic --</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary">Enter Clinic</button>
                </form>

                <div id="noClinicsMessage" style="display: none;" class="mt-3">
                    <div class="alert alert-warning">
                        <h5>You are not assigned to any clinic.</h5>
                        <p class="mb-0">If you are a new admin, <a href="/setup_clinic" class="fw-bold text-success">click here to set up your first clinic</a>.</p>
                        <p class="mt-2 mb-0">If you were already assigned, contact your clinic admin.</p>
                    </div>
                </div>
            </div>
            
            <div class="footer-note">
                <a href="/api/logout" id="logoutLink">Logout</a>
            </div>
        </div>
    </main>

    <script src="/static/js/shell.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', async function() {
        const { authenticated, session } = await CMShell.init({ active: 'select_clinic' });
        if (!authenticated) return;

        const form = document.getElementById('selectClinicForm');
        const select = document.getElementById('clinicSelect');
        const noMsg = document.getElementById('noClinicsMessage');
        const logoutLink = document.getElementById('logoutLink');

        logoutLink.addEventListener('click', async (e) => {
            e.preventDefault();
            await fetch('/api/logout', { method: 'POST' });
            window.location.href = '/login';
        });

        const clinics = session.clinics || [];

        if (clinics.length === 0) {
            form.style.display = 'none';
            noMsg.style.display = 'block';
        } else {
            clinics.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c.id;
                opt.textContent = `${c.name} (${c.role})`;
                select.appendChild(opt);
            });
        }

        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            const clinicId = select.value;

            if (!clinicId) {
                alert('Please select a clinic.');
                return;
            }

            const btn = form.querySelector('button[type="submit"]');
            btn.disabled = true;
            btn.textContent = 'Switching...';

            try {
                const res = await fetch('/api/clinics/select', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ clinic_id: clinicId })
                });
                const data = await res.json();

                if (data.success) {
                    window.location.href = '/dashboard';
                } else {
                    alert('Error: ' + (data.error || 'Could not switch clinic'));
                    btn.disabled = false;
                    btn.textContent = 'Enter Clinic';
                }
            } catch (err) {
                alert('Network error. Please try again.');
                btn.disabled = false;
                btn.textContent = 'Enter Clinic';
            }
        });
    });
    </script>
</body>
</html>
