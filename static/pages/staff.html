<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Management — ClinicManager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#0A3530">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>
    <main>
        <div class="container">
            <div class="app-container">
                <div id="cmFlashContainer"></div>
                
                <div class="row">
                    <div class="col-12">
                        <div class="d-flex justify-content-between align-items-center mb-3 border-bottom pb-2">
                            <h3 class="mb-0">👨‍⚕️ Staff Management</h3>
                            <div>
                                <button class="btn btn-outline-secondary btn-sm me-2" data-bs-toggle="modal" data-bs-target="#createClinicModal" data-role-allow="admin">
                                    ➕ New Clinic
                                </button>
                                <button class="btn btn-success btn-sm" data-bs-toggle="modal" data-bs-target="#addStaffModal" data-role-allow="admin,doctor">
                                    ➕ Add Staff
                                </button>
                            </div>
                        </div>

                        <div class="table-responsive">
                            <table class="table table-striped table-hover align-middle">
                                <thead class="table-dark">
                                    <tr>
                                        <th>Full Name</th>
                                        <th>Role</th>
                                        <th>Username</th>
                                        <th>Status</th>
                                        <th class="text-end">Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="staffTableBody">
                                    <tr id="emptyRow">
                                        <td colspan="5" class="text-center text-muted py-4">Loading staff...</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Add Staff Modal -->
    <div class="modal fade" id="addStaffModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-dark text-white">
                    <h5 class="modal-title">➕ Add New Staff</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addStaffForm">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Full Name</label>
                            <input type="text" name="full_name" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Role</label>
                            <select name="role" class="form-select" required>
                                <option value="Admin">Admin</option>
                                <option value="Doctor">Doctor</option>
                                <option value="Nurse">Nurse</option>
                                <option value="Pharmacist">Pharmacist</option>
                                <option value="Receptionist">Receptionist</option>
                                <option value="Cashier">Cashier</option>
                                <option value="Guard">Guard</option>
                                <option value="Ground_worker">Ground Worker</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Username</label>
                            <input type="text" name="username" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Password</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-success" id="saveStaffBtn">✅ Save Staff</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Staff Modal -->
    <div class="modal fade" id="editStaffModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title">✏️ Edit Staff</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="editStaffForm">
                        <input type="hidden" name="staff_id" id="editStaffId">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Full Name</label>
                            <input type="text" name="full_name" id="editFullName" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Role</label>
                            <select name="role" id="editRole" class="form-select" required>
                                <option value="Admin">Admin</option>
                                <option value="Doctor">Doctor</option>
                                <option value="Nurse">Nurse</option>
                                <option value="Pharmacist">Pharmacist</option>
                                <option value="Receptionist">Receptionist</option>
                                <option value="Cashier">Cashier</option>
                                <option value="Guard">Guard</option>
                                <option value="Ground_worker">Ground Worker</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Username</label>
                            <input type="text" name="username" id="editUsername" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Reset Password <small class="text-muted">(leave blank to keep current)</small></label>
                            <input type="password" name="password" id="editPassword" class="form-control" placeholder="Enter new password or leave empty">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="updateStaffBtn">💾 Update Staff</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Create New Clinic Modal (Admin Only) -->
    <div class="modal fade" id="createClinicModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-secondary text-white">
                    <h5 class="modal-title">➕ Create New Clinic</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="createClinicForm">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Clinic Name <span class="text-danger">*</span></label>
                            <input type="text" name="clinic_name" class="form-control" placeholder="e.g. Mwai Clinic" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Phone Number</label>
                            <input type="text" name="phone" class="form-control" placeholder="e.g. 0992528659">
                        </div>
                        <button type="submit" class="btn btn-secondary w-100" id="createClinicSubmitBtn">➕ Create Clinic</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/shell.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', async function () {
        const { authenticated, session } = await CMShell.init({ active: 'staff' });
        if (!authenticated) return;

        const role = (session.role || '').toLowerCase();
        
        // Apply role-based visibility for buttons
        document.querySelectorAll('[data-role-allow]').forEach(el => {
            const allowed = el.getAttribute('data-role-allow').split(',').map(r => r.trim().toLowerCase());
            el.style.display = allowed.includes(role) ? '' : 'none';
        });

        loadStaff();

        // --- ADD STAFF ---
        document.getElementById('saveStaffBtn').addEventListener('click', function() {
            const form = document.getElementById('addStaffForm');
            const data = new FormData(form);
            const dataObj = {};
            data.forEach((value, key) => { dataObj[key] = value; });

            fetch('/api/staff/add', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dataObj)
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    location.reload();
                } else {
                    alert('Error: ' + data.error);
                }
            })
            .catch(() => alert('Network error. Please try again.'));
        });

        // --- EDIT STAFF ---
        document.querySelectorAll('.edit-staff-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.getElementById('editStaffId').value = this.dataset.id;
                document.getElementById('editFullName').value = this.dataset.name;
                document.getElementById('editRole').value = this.dataset.role;
                document.getElementById('editUsername').value = this.dataset.username;
                document.getElementById('editPassword').value = '';

                const modal = new bootstrap.Modal(document.getElementById('editStaffModal'));
                modal.show();
            });
        });

        document.getElementById('updateStaffBtn').addEventListener('click', function() {
            const form = document.getElementById('editStaffForm');
            const data = new FormData(form);
            const dataObj = {};
            data.forEach((value, key) => { dataObj[key] = value; });

            fetch('/api/staff/edit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dataObj)
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    location.reload();
                } else {
                    alert('Error: ' + data.error);
                }
            })
            .catch(() => alert('Network error. Please try again.'));
        });

        // --- CREATE CLINIC ---
        document.getElementById('createClinicSubmitBtn').addEventListener('click', function(e) {
            e.preventDefault();
            const form = document.getElementById('createClinicForm');
            const data = new FormData(form);
            const dataObj = {};
            data.forEach((value, key) => { dataObj[key] = value; });

            fetch('/api/clinics/create', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dataObj)
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    location.reload();
                } else {
                    alert('Error: ' + data.error);
                }
            })
            .catch(() => alert('Network error. Please try again.'));
        });
    });

    async function loadStaff() {
        try {
            const res = await fetch('/api/staff');
            if (!res.ok) throw new Error('bad response');
            const data = await res.json();
            renderStaff(data);
        } catch (err) {
            document.getElementById('staffTableBody').innerHTML =
                '<tr><td colspan="5" class="text-center text-muted py-4">Unable to load staff. Check your connection.</td></tr>';
        }
    }

    function renderStaff(data) {
        const staff = data.staff || [];
        const tbody = document.getElementById('staffTableBody');

        if (staff.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted py-4">No staff members added yet.</td></tr>';
            return;
        }

        tbody.innerHTML = staff.map(s => `
            <tr>
                <td><strong>${cmEscapeHtml(s.name)}</strong></td>
                <td><span class="badge bg-info text-dark">${cmEscapeHtml(s.role)}</span></td>
                <td><code>${cmEscapeHtml(s.username)}</code></td>
                <td>
                    ${s.active === 1
                        ? '<span class="badge bg-success">Active</span>'
                        : '<span class="badge bg-secondary">Inactive</span>'
                    }
                </td>
                <td class="text-end">
                    <button class="btn btn-outline-primary btn-sm edit-staff-btn"
                            data-id="${s.id}"
                            data-name="${cmEscapeHtml(s.name)}"
                            data-role="${cmEscapeHtml(s.role)}"
                            data-username="${cmEscapeHtml(s.username)}"
                            data-active="${s.active}">
                        ✏️ Edit
                    </button>

                    ${s.active === 1
                        ? `<button class="btn btn-outline-danger btn-sm deactivate-btn" data-id="${s.id}" data-name="${cmEscapeHtml(s.name)}">🚫 Deactivate</button>`
                        : `<button class="btn btn-outline-success btn-sm reactivate-btn" data-id="${s.id}" data-name="${cmEscapeHtml(s.name)}">✅ Reactivate</button>`
                    }
                </td>
            </tr>
        `).join('');

        attachStaffHandlers();
    }

    function attachStaffHandlers() {
        // DEACTIVATE
        document.querySelectorAll('.deactivate-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                if (confirm(`⚠️ Are you sure you want to deactivate "${this.dataset.name}"? They will no longer be able to log in.`)) {
                    fetch('/api/staff/deactivate/' + this.dataset.id, { method: 'POST' })
                        .then(response => response.json())
                        .then(data => {
                            if (data.success) location.reload();
                            else alert('Error: ' + data.error);
                        });
                }
            });
        });

        // REACTIVATE
        document.querySelectorAll('.reactivate-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                if (confirm(`✅ Reactivate "${this.dataset.name}"?`)) {
                    fetch('/api/staff/reactivate/' + this.dataset.id, { method: 'POST' })
                        .then(response => response.json())
                        .then(data => {
                            if (data.success) location.reload();
                            else alert('Error: ' + data.error);
                        });
                }
            });
        });
    }

    function cmEscapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str || '';
        return div.innerHTML;
    }
    </script>
</body>
</html>
