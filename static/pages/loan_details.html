<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Details — ClinicManager</title>
    <link href="/static/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#0A3530">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>
    <main>
        <div class="container">
            <div class="app-container">
                <div id="cmFlashContainer"></div>
                
                <div class="row">
                    <div class="col-12">
                        <div class="d-flex justify-content-between align-items-center mb-3 border-bottom pb-2">
                            <div>
                                <h3 class="mb-0">📋 Loan Details</h3>
                                <small class="text-muted" id="loanSummary">Loading...</small>
                            </div>
                            <a href="/loans" class="btn btn-secondary btn-sm">← Back to Loans</a>
                        </div>

                        <div class="row">
                            <div class="col-md-6">
                                <div class="card mb-4">
                                    <div class="card-header bg-dark text-white">
                                        <h6 class="mb-0">Loan Information</h6>
                                    </div>
                                    <div class="card-body" id="loanInfoBody">
                                        <dl class="row mb-0">
                                            <dt class="col-sm-4">Patient:</dt>
                                            <dd class="col-sm-8" id="loanPatient">—</dd>
                                            
                                            <dt class="col-sm-4">Total Fee:</dt>
                                            <dd class="col-sm-8" id="loanTotal"><span class="currency-symbol">MK</span> 0.00</dd>
                                            
                                            <dt class="col-sm-4">Amount Paid:</dt>
                                            <dd class="col-sm-8" id="loanPaid"><span class="currency-symbol">MK</span> 0.00</dd>
                                            
                                            <dt class="col-sm-4">Balance:</dt>
                                            <dd class="col-sm-8 text-danger fw-bold" id="loanBalance"><span class="currency-symbol">MK</span> 0.00</dd>
                                            
                                            <dt class="col-sm-4">Witness:</dt>
                                            <dd class="col-sm-8" id="loanWitness">—</dd>
                                            
                                            <dt class="col-sm-4">Due Date:</dt>
                                            <dd class="col-sm-8" id="loanDueDate">—</dd>
                                            
                                            <dt class="col-sm-4">Status:</dt>
                                            <dd class="col-sm-8" id="loanStatus">—</dd>
                                        </dl>
                                    </div>
                                </div>

                                <!-- Add Payment Form -->
                                <div id="paymentFormContainer" style="display: none;">
                                    <div class="card">
                                        <div class="card-header bg-success text-white">
                                            <h6 class="mb-0">Record Payment</h6>
                                        </div>
                                        <div class="card-body">
                                            <div class="mb-3">
                                                <label class="form-label fw-bold">Payment Amount (<span class="currency-symbol">MK</span>)</label>
                                                <input type="number" step="0.01" id="loanPaymentAmount" class="form-control" placeholder="Enter amount" min="0.01">
                                            </div>
                                            <button class="btn btn-success" id="recordLoanPaymentBtn">Record Payment</button>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="col-md-6">
                                <div class="card">
                                    <div class="card-header bg-dark text-white">
                                        <h6 class="mb-0">Payment History</h6>
                                    </div>
                                    <div class="card-body">
                                        <div class="table-responsive">
                                            <table class="table table-sm">
                                                <thead>
                                                    <tr>
                                                        <th>Date</th>
                                                        <th class="text-end">Amount (<span class="currency-symbol">MK</span>)</th>
                                                    </tr>
                                                </thead>
                                                <tbody id="paymentHistoryBody">
                                                    <tr><td colspan="2" class="text-center text-muted">Loading payments...</td></tr>
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="/static/js/shell.js"></script>
    <script>
    // Get visit_id from URL query string
    const urlParams = new URLSearchParams(window.location.search);
    const visitId = urlParams.get('visit_id');
    
    if (!visitId) {
        alert('No visit ID provided. Go back to loans.');
        window.location.href = '/loans';
    }

    let currentCurrency = { symbol: 'MK', subunit_ratio: 100 };

    document.addEventListener('DOMContentLoaded', async function () {
        const { authenticated } = await CMShell.init({ active: 'loan_details' });
        if (!authenticated) return;

        // Load currency first
        await loadCurrency();
        loadLoanDetails(visitId);
    });

    async function loadCurrency() {
        try {
            const res = await fetch('/api/clinic/currency');
            if (res.ok) {
                currentCurrency = await res.json();
                // Update currency symbols on the page
                document.querySelectorAll('.currency-symbol')
                    .forEach(el => el.textContent = currentCurrency.symbol);
            }
        } catch (err) {
            console.error('Failed to load currency:', err);
        }
    }


    async function loadLoanDetails(id) {
        try {
            const res = await fetch('/api/loans/details/' + id);
            if (!res.ok) throw new Error('bad response');
            const data = await res.json();
            renderLoanDetails(data);
        } catch (err) {
            document.getElementById('loanSummary').textContent = 'Error loading loan details';
            console.error(err);
        }
    }

    function renderLoanDetails(data) {
        const visit = data.visit;
        const payments = data.payments || [];

        document.getElementById('loanSummary').textContent = 
            `${visit.patient_name || 'Retail Sale'} · Total: ${CMShell.formatCurrency(visit.total_fee,currentCurrency)} · Paid: ${CMShell.formatCurrency(visit.amount_paid,currentCurrency)} · Balance: ${CMShell.formatCurrency(visit.total_fee - visit.amount_paid,currentCurrency)}`;

        document.getElementById('loanPatient').textContent = visit.patient_name || '🏪 Retail Sale';
        document.getElementById('loanTotal').textContent = CMShell.formatCurrency(visit.total_fee,currentCurrency);
        document.getElementById('loanPaid').textContent = CMShell.formatCurrency(visit.amount_paid,currentCurrency);
        document.getElementById('loanBalance').textContent = CMShell.formatCurrency(visit.total_fee - visit.amount_paid,currentCurrency);
        document.getElementById('loanWitness').textContent = visit.loan_witness || '—';
        document.getElementById('loanDueDate').textContent = visit.loan_due_date || 'No due date set';
        document.getElementById('loanStatus').innerHTML = `<span class="badge bg-info text-dark">${visit.status}</span>`;

        // Show payment form if loan is active and has balance
        const balance = visit.total_fee - visit.amount_paid;
        if (visit.status === 'Loan Active' && balance > 0) {
            document.getElementById('paymentFormContainer').style.display = 'block';
            document.getElementById('loanPaymentAmount').max = (balance / currentCurrency.subunit_ratio).toFixed(2);
        }

        // Payment history
        const tbody = document.getElementById('paymentHistoryBody');
        if (payments.length === 0) {
            tbody.innerHTML = '<tr><td colspan="2" class="text-center text-muted">No payments recorded yet.</td></tr>';
        } else {
            tbody.innerHTML = payments.map(p => `
                <tr>
                    <td><small>${p.date ? p.date.slice(0, 10) : ''}</small></td>
                    <td class="text-end">${CMShell.formatCurrency(p.amount,currentCurrency)}</td>
                </tr>
            `).join('');
        }

        // Record payment button
        document.getElementById('recordLoanPaymentBtn').addEventListener('click', function() {
            const amountInput = document.getElementById('loanPaymentAmount');
            const amount = parseFloat(amountInput.value) * currentCurrency.subunit_ratio;
            const maxAmount = visit.total_fee - visit.amount_paid;

            if (!amount || amount <= 0) {
                alert('Please enter a valid payment amount.');
                return;
            }
            if (amount > maxAmount) {
                alert('Payment cannot exceed the remaining balance.');
                return;
            }

            if (!confirm('Record payment of ' + CMShell.formatCurrency(amount,currentCurrency) + '?')) {
                return;
            }

            const btn = this;
            btn.disabled = true;
            btn.textContent = 'Processing...';

            fetch('/api/loans/pay/' + visitId, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ amount: amount })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    location.reload();
                } else {
                    alert('Error: ' + (data.error || 'Failed to record payment.'));
                    btn.disabled = false;
                    btn.textContent = 'Record Payment';
                }
            })
            .catch(err => {
                alert('Network error. Please try again.');
                btn.disabled = false;
                btn.textContent = 'Record Payment';
            });
        });
    }
    </script>
</body>
</html>
