<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audit Log — ClinicManager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#0A3530">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>
    <main>
        <div class="container">
            <div class="app-container">
                <div id="cmFlashContainer"></div>
                
                <div class="row">
                    <div class="col-12">
                        <h3 class="mb-3">📋 Audit Log</h3>
                        <div class="table-responsive">
                            <table class="table table-sm table-striped">
                                <thead class="table-dark">
                                    <tr>
                                        <th>Time</th>
                                        <th>Staff</th>
                                        <th>Action</th>
                                        <th>Table</th>
                                        <th>Record ID</th>
                                        <th>Old Value</th>
                                        <th>New Value</th>
                                    </tr>
                                </thead>
                                <tbody id="auditLogBody">
                                    <tr id="emptyRow">
                                        <td colspan="7" class="text-center text-muted py-4">Loading audit logs...</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="/static/js/shell.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', async function () {
        const { authenticated } = await CMShell.init({ active: 'audit_log' });
        if (!authenticated) return;

        loadAuditLogs();
    });

    async function loadAuditLogs() {
        try {
            const res = await fetch('/api/audit');
            if (!res.ok) throw new Error('bad response');
            const data = await res.json();
            renderAuditLogs(data);
        } catch (err) {
            document.getElementById('auditLogBody').innerHTML =
                '<tr><td colspan="7" class="text-center text-muted py-4">Unable to load audit logs. Check your connection.</td></tr>';
        }
    }

    function renderAuditLogs(data) {
        const logs = data.logs || [];
        const tbody = document.getElementById('auditLogBody');

        if (logs.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted py-4">No audit logs yet.</td></tr>';
            return;
        }

        tbody.innerHTML = logs.map(log => `
            <tr>
                <td><small>${log.timestamp ? log.timestamp.slice(0, 16) : ''}</small></td>
                <td><small>${cmEscapeHtml(log.full_name || 'System')}</small></td>
                <td><span class="badge bg-info text-dark">${cmEscapeHtml(log.action)}</span></td>
                <td><small>${cmEscapeHtml(log.table_name)}</small></td>
                <td><small>${log.record_id}</small></td>
                <td><small class="text-muted">${cmEscapeHtml(log.old_value || '—')}</small></td>
                <td><small class="text-success">${cmEscapeHtml(log.new_value || '—')}</small></td>
            </tr>
        `).join('');
    }

    function cmEscapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str || '';
        return div.innerHTML;
    }
    </script>
</body>
</html>
