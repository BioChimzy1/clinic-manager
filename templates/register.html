{% extends 'layout.html' %}
{% block content %}
<div class="row mx-auto" style="max-width: 600px;">
    <div class="col-12">
        <h3 class="mb-4 text-dark border-bottom pb-2">Register New Patient</h3>

        <div id="offlineNotice" class="alert alert-warning py-2 px-3 mb-3" style="display: none;">
            📡 You're offline — this patient will be saved on your device now and sent to the server automatically once you're back online.
        </div>

        <form id="registerForm">

            <div class="mb-3">
                <label class="form-label fw-bold">Full Name</label>
                <input type="text" name="name" class="form-control" placeholder="e.g. Bio Chimzy" required>
            </div>
                        <div class="row mb-3">
                <div class="col-12">
                    <label class="form-label fw-bold">Registration Type</label>
                    <select name="appointment_type" class="form-select" required>
                        <option value="Walk-In">Walk-In (No appointment)</option>
                        <option value="Appointment">Scheduled Appointment</option>
                    </select>
                </div>
            </div>
            <div class="row mb-3">
                <div class="col-6">
                    <label class="form-label fw-bold">Date of Birth</label>
                    <input type="date" name="date_of_birth" class="form-control" required>
                </div>
                <div class="col-6">
                    <label class="form-label fw-bold">Sex</label>
                    <select name="sex" class="form-select" required>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Phone Number</label>
                <input type="text" name="phone" class="form-control" placeholder="099xxxxxxx">
            </div>

            <div class="mb-4">
                <label class="form-label fw-bold">Location / Area</label>
                <input type="text" name="location" class="form-control" placeholder="e.g. Mkwalula" required>
            </div>

            <div class="d-flex justify-content-end gap-2">
                <a href="/dashboard" class="btn btn-secondary">Cancel</a>
                <button type="submit" id="saveBtn" class="btn btn-success px-4">Save Patient</button>
            </div>
        </form>
    </div>
</div>

<script src="{{ url_for('static', filename='js/outbox.js') }}"></script>
<script>
document.addEventListener('DOMContentLoaded', function () {
    const form = document.getElementById('registerForm');
    const saveBtn = document.getElementById('saveBtn');
    const offlineNotice = document.getElementById('offlineNotice');

    if (!navigator.onLine) {
        offlineNotice.style.display = 'block';
    }

    form.addEventListener('submit', async function (e) {
        e.preventDefault();
        saveBtn.disabled = true;
        saveBtn.textContent = 'Saving...';

        const payload = {
            name: form.name.value.trim(),
            date_of_birth: form.date_of_birth.value,
            sex: form.sex.value,
            phone: form.phone.value.trim(),
            location: form.location.value.trim(),
            appointment_type: form.appointment_type.value
        };

        // Saved to IndexedDB before we even try the network — so a
        // dropped connection or a closed tab right after tapping Save
        // never loses the registration. The queue page picks up
        // anything still unsynced and keeps retrying automatically.
        const { success } = await cmQueueRegistration(payload);

        // Base navigation on whether the sync actually succeeded, not
        // just navigator.onLine — that flag can be true even when the
        // device has no real route to the server (e.g. captive portal,
        // flaky Wi-Fi), which would otherwise redirect to /queue while
        // the record is still sitting unsynced.

        if (success) {
            window.location.href = '/queue';
        } else {
            // Distinguish "no network at all" from "connected but server
            // unreachable" (flaky Wi-Fi, captive portal, weak signal, etc.)
            // rather than assuming every sync failure means fully offline.
            const reason = navigator.onLine
                ? "You're connected but the server isn't responding."
                : "Turn on your internet.";
            alert(`✅ Patient saved locally! ${reason} Go to the Queue to confirm once connected.`);
            form.reset();
            saveBtn.disabled = false;
            saveBtn.textContent = 'Save Patient';
        }
    });
});
</script>
{% endblock %}
