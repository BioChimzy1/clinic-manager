{% extends 'layout.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-2 border-bottom pb-2">
    <h3 class="mb-0">Active Queue</h3>
    <a href="/register" class="btn btn-success btn-sm">➕ Register New Patient</a>
</div>

<div class="mb-3 d-flex align-items-center gap-2 flex-wrap">
    <span class="badge bg-dark fs-6" id="queueCountBadge">Loading...</span>
    <span class="badge bg-warning text-dark" id="staleBadge" style="display: none;"></span>
</div>

<div id="pendingSyncBanner" class="alert alert-warning py-2 px-3 mb-3" style="display: none;"></div>

<div class="mb-3">
    <input type="text" id="queueSearchInput" class="form-control" placeholder="🔍 Search by patient name..." autocomplete="off">
</div>

<div id="noResultsMsg" class="text-center text-muted py-4" style="display: none;">
    No patients match your search.
</div>

<div class="table-responsive">
    <table class="table table-striped table-hover align-middle">
        <thead class="table-dark">
            <tr>
                <th style="min-width: 120px;">Patient Name</th>
                <th style="width: 100px;">Type</th>
                <th style="width: 80px;">Sex</th>
                <th style="width: 110px;">Status</th>
                <th style="width: 100px; text-align: right;">Action</th>
            </tr>
        </thead>
        <tbody id="queueTableBody">
            <!-- Rows are rendered by JS below, from /api/queue or the
                 last cached snapshot. There is no server-rendered data
                 here on purpose -- this keeps the page cacheable by the
                 service worker for offline loads. -->
        </tbody>
    </table>
</div>

<script src="{{ url_for('static', filename='js/outbox.js') }}"></script>
<script>
let currentPatients = [];

document.addEventListener('DOMContentLoaded', function () {
    loadQueue();
    renderPendingRegistrations();
    window.addEventListener('online', () => {
        loadQueue();
        renderPendingRegistrations();
    });

    const searchInput = document.getElementById('queueSearchInput');
    searchInput.addEventListener('input', function () {
        const query = this.value.trim().toLowerCase();
        applySearch(query);
    });
});

// Tries the live API first. On success, caches the snapshot for next
// time we're offline. On failure, falls back to the last cached
// snapshot and clearly labels it as possibly stale, so nobody mistakes
// it for live data.
async function loadQueue() {
    try {
        const res = await fetch('/api/queue');
        if (!res.ok) throw new Error('bad response');
        const data = await res.json();
        await cmSaveQueueSnapshot(data);
        renderQueue(data, false);
    } catch (err) {
        const cached = await cmGetQueueSnapshot();
        if (cached) {
            renderQueue(cached, true);
        } else {
            // Never successfully loaded on this device before -- nothing
            // to fall back to.
            document.getElementById('queueCountBadge').textContent = 'Unable to load queue';
            document.getElementById('queueTableBody').innerHTML =
                '<tr><td colspan="5" class="text-center text-muted py-4">No cached queue data yet. Connect once to load it.</td></tr>';
        }
    }
}

function renderQueue(data, isStale) {
    currentPatients = data.patients || [];
    const tbody = document.getElementById('queueTableBody');
    const countBadge = document.getElementById('queueCountBadge');
    const staleBadge = document.getElementById('staleBadge');

    countBadge.textContent = `${currentPatients.length} ${currentPatients.length === 1 ? 'patient' : 'patients'} in queue`;

    if (isStale) {
        const when = new Date(data.fetched_at).toLocaleString();
        staleBadge.textContent = `⏳ Last updated ${when} — may be outdated`;
        staleBadge.style.display = 'inline-block';
    } else {
        staleBadge.style.display = 'none';
    }

    if (currentPatients.length === 0) {
        tbody.innerHTML = '<tr id="emptyQueueRow"><td colspan="5" class="text-center text-muted py-4">No patients in the queue.</td></tr>';
        return;
    }

    tbody.innerHTML = currentPatients.map(renderQueueRow).join('');
    applySearch(document.getElementById('queueSearchInput').value.trim().toLowerCase());
}

function renderQueueRow(p) {
    const typeBadge = p.appointment_type === 'Appointment'
        ? '<span class="badge bg-primary">Appointment</span>'
        : '<span class="badge bg-success">Walk-In</span>';

    let statusBadge;
    if (p.status === 'Pending') {
        statusBadge = '<span class="badge bg-info text-dark">Pending</span>';
    } else if (p.status === 'Returned to Doctor') {
        // Sent back by the cashier before payment -- distinct from a
        // fresh Waiting arrival so the doctor knows this one needs a
        // fix, not a first-time consult.
        statusBadge = '<span class="badge" style="background-color:#b8860b;color:#fff;">↩ Returned by Cashier</span>';
    } else {
        statusBadge = '<span class="badge bg-warning text-dark">Waiting</span>';
    }

    const actionBtn = p.status === 'Pending'
        ? `<a href="/appointments/review/${p.id}" class="btn btn-outline-warning btn-sm" style="white-space: nowrap;">📋 Review</a>`
        : `<a href="/visit/${p.id}" class="btn btn-primary btn-sm" style="white-space: nowrap;">📋 Open</a>`;

    return `
        <tr data-name="${cmEscapeHtml(p.name.toLowerCase())}">
            <td><strong>${cmEscapeHtml(p.name)}</strong></td>
            <td>${typeBadge}</td>
            <td>${cmEscapeHtml(p.sex || '')}</td>
            <td>${statusBadge}</td>
            <td class="text-end">${actionBtn}</td>
        </tr>
    `;
}

function applySearch(query) {
    const rows = document.querySelectorAll('table tbody tr[data-name]');
    const noResultsMsg = document.getElementById('noResultsMsg');
    let visibleCount = 0;

    rows.forEach((row) => {
        const matches = row.getAttribute('data-name').includes(query);
        row.style.display = matches ? '' : 'none';
        if (matches) visibleCount++;
    });

    noResultsMsg.style.display = (visibleCount === 0 && query.length > 0) ? 'block' : 'none';
}

// Unchanged from before: shows patients registered offline that
// haven't synced to the server yet, as temporary rows on top of
// whatever loadQueue() rendered.
async function renderPendingRegistrations() {
    const all = await cmSyncAllRegistrations();
    const pending = all.filter((r) => !r.synced);
    const banner = document.getElementById('pendingSyncBanner');
    const tbody = document.getElementById('queueTableBody');

    document.querySelectorAll('tr[data-pending-uuid]').forEach((el) => el.remove());

    if (pending.length === 0) {
        banner.style.display = 'none';
        return;
    }

    banner.style.display = 'block';
    banner.textContent = `⏳ ${pending.length} patient(s) registered offline, waiting to sync to the server...`;

    const emptyRow = document.getElementById('emptyQueueRow');
    if (emptyRow) emptyRow.remove();

    pending.forEach((record) => {
        const p = record.payload;
        const tr = document.createElement('tr');
        tr.setAttribute('data-pending-uuid', record.client_uuid);
        tr.setAttribute('data-name', p.name.toLowerCase());
        const typeBadge = p.appointment_type === 'Appointment'
            ? '<span class="badge bg-primary">Appointment</span>'
            : '<span class="badge bg-success">Walk-In</span>';
        tr.innerHTML = `
            <td><strong>${cmEscapeHtml(p.name)}</strong></td>
            <td>${typeBadge}</td>
            <td>${cmEscapeHtml(p.sex || '')}</td>
            <td><span class="badge bg-secondary">⏳ Syncing</span></td>
            <td class="text-end text-muted small">Waiting for connection</td>
        `;
        tbody.insertBefore(tr, tbody.firstChild);
    });

    // renderPendingRegistrations may have just synced records, which
    // means the real queue on the server now includes them -- refresh
    // so they show up as proper rows instead of "Syncing" placeholders.
    if (all.some((r) => r.synced) && navigator.onLine) {
        loadQueue();
    }
}
</script>
{% endblock %}
