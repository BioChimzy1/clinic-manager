{% extends 'layout.html' %}
{% block content %}
<div class="row">
    <div class="col-12">
        <div class="d-flex justify-content-between align-items-center mb-3 border-bottom pb-2">
            <h3 class="mb-0">🏪 Pharmacy Retail Sale</h3>
        </div>

        <div class="card shadow-sm mb-4">
            <div class="card-header bg-success text-white">
                <h5 class="mb-0">🛒 Add Items</h5>
            </div>
            <div class="card-body">
                <!-- Item Search and Add Form -->
                <form id="addItemForm" class="row g-2">
                    <div class="col-md-8">
                        <select name="price_list_id" id="itemSelect" class="form-select" required>
                            <option value="">-- Select an item --</option>
                            {% for item in items %}
                            <option value="{{ item[0] }}" data-price="{{ item[3] }}" data-pack="{{ item[4] }}" data-name="{{ item[1] }}" data-type="{{ item[2] }}">
                                {{ item[1] }} ({{ item[2] }}) - MK {{ "%.2f"|format(item[3] / 100) }} - {{ item[4] }} units
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-2">
                        <input type="number" id="qtyInput" class="form-control" value="1" min="1">
                    </div>
                    <div class="col-md-2">
                        <button type="button" class="btn btn-primary w-100" id="addToCartBtn">➕ Add</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Shopping Cart Table -->
        <div class="card shadow-sm">
            <div class="card-header bg-dark text-white">
                <h5 class="mb-0">🧾 Current Sale</h5>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-sm table-striped align-middle">
                        <thead>
                            <tr>
                                <th>Item</th>
                                <th class="text-end">Unit Price</th>
                                <th class="text-end">Qty</th>
                                <th class="text-end">Total</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="cartBody">
                            <tr id="emptyCartRow">
                                <td colspan="5" class="text-center text-muted py-3">No items added yet. Select an item above and click Add.</td>
                            </tr>
                        </tbody>
                        <tfoot>
                            <tr>
                                <th colspan="3" class="text-end">Grand Total</th>
                                <th class="text-end" id="grandTotal">MK 0.00</th>
                                <th></th>
                            </tr>
                        </tfoot>
                    </table>
                </div>

                <div class="mt-3 text-end">
                    <!-- Proceed to Payment triggers the unified modal -->
                    <button class="btn btn-success px-4" id="proceedToPaymentBtn" disabled>💳 Proceed to Payment</button>
                </div>
            </div>
        </div>
    </div>
</div>

{% include 'payment_modal.html' %}

<script>
document.addEventListener('DOMContentLoaded', function() {
    // Track items in the shopping cart
    const cart = [];
    let retailVisitId = null;
    let retailTotal = 0;

    // Helper: Format money
    function formatMK(tambala) {
        return 'MK ' + (tambala / 100).toFixed(2);
    }

    // Render the cart table
    function renderCart() {
        const tbody = document.getElementById('cartBody');
        const emptyRow = document.getElementById('emptyCartRow');
        const grandTotalEl = document.getElementById('grandTotal');
        const proceedBtn = document.getElementById('proceedToPaymentBtn');

        tbody.innerHTML = '';

        if (cart.length === 0) {
            tbody.appendChild(emptyRow);
            grandTotalEl.textContent = 'MK 0.00';
            proceedBtn.disabled = true;
            retailTotal = 0;
            return;
        }

        let grandTotal = 0;

        cart.forEach((item, index) => {
            const packQty = item.packQty > 0 ? item.packQty : 1;
            const unitPrice = item.price / packQty;
            const lineTotal = Math.round(unitPrice * item.qty);
            grandTotal += lineTotal;

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><strong>${item.name}</strong> <small class="text-muted">(${item.type})</small></td>
                <td class="text-end">${formatMK(unitPrice)}</td>
                <td class="text-end">${item.qty}</td>
                <td class="text-end">${formatMK(lineTotal)}</td>
                <td class="text-end">
                    <button class="btn btn-outline-danger btn-sm remove-item-btn" data-index="${index}">✕</button>
                </td>
            `;
            tbody.appendChild(tr);
        });

        grandTotalEl.textContent = formatMK(grandTotal);
        retailTotal = grandTotal;
        proceedBtn.disabled = false;
    }

    // Add item to cart
    document.getElementById('addToCartBtn').addEventListener('click', function() {
        const select = document.getElementById('itemSelect');
        const qtyInput = document.getElementById('qtyInput');
        const selectedOption = select.options[select.selectedIndex];

        if (select.value === '') {
            alert('Please select an item.');
            return;
        }

        const qty = parseInt(qtyInput.value);
        if (isNaN(qty) || qty < 1) {
            alert('Please enter a valid quantity.');
            return;
        }

        cart.push({
            price_list_id: parseInt(select.value),
            name: selectedOption.dataset.name,
            type: selectedOption.dataset.type,
            price: parseInt(selectedOption.dataset.price),
            packQty: parseInt(selectedOption.dataset.pack),
            qty: qty
        });

        renderCart();
        select.value = '';
        qtyInput.value = '1';
    });

    // Remove item from cart
    document.getElementById('cartBody').addEventListener('click', function(e) {
        if (e.target.classList.contains('remove-item-btn')) {
            const index = parseInt(e.target.dataset.index);
            cart.splice(index, 1);
            renderCart();
        }
    });

    // --- Unified Payment Modal Logic for Retail ---
    const paymentModal = new bootstrap.Modal(document.getElementById('paymentModal'));

    // Populate Staff Witness Dropdown
    fetch('/api/staff/list')
        .then(res => res.json())
        .then(data => {
            const select = document.getElementById('loanWitness');
            select.innerHTML = '<option value="">-- Select a staff member --</option>';
            data.staff.forEach(s => {
                const opt = document.createElement('option');
                opt.value = s.id;
                opt.textContent = s.name;
                select.appendChild(opt);
            });
        });

    document.getElementById('proceedToPaymentBtn').addEventListener('click', function() {
        // Create a temporary retail visit to get an ID
        fetch('/retail/create_draft', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ cart: cart })
        })
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                retailVisitId = data.visit_id;
                
                // Populate Modal
                document.getElementById('modalPatientName').textContent = '🏪 Retail Sale';
                document.getElementById('modalTotalFee').textContent = formatMK(retailTotal);
                document.getElementById('fullAmountDisplay').textContent = formatMK(retailTotal);
                
                // Reset form
                document.getElementById('discountAmount').value = '';
                document.getElementById('discountReason').value = '';
                document.getElementById('loanAmount').value = '';
                document.getElementById('loanWitness').value = '';
                document.getElementById('loanDueDate').value = '';
                document.getElementById('paymentReference').value = '';
                document.getElementById('paymentChannel').value = 'Cash';
                document.getElementById('medicalAidCompany').value = '';
                document.getElementById('medicalAidFields').style.display = 'none';
                document.getElementById('refFieldWrapper').style.display = 'none';
                document.getElementById('roundingSelect').value = '0';
                updateRoundedTotalDisplay();

                // Reset Payment Mode
                document.getElementById('payFull').checked = true;
                togglePaymentMode('full');

                // Load Invoice Items
                document.getElementById('invoiceItemsBody').innerHTML = '<tr><td colspan="5" class="text-center text-muted">Loading items...</td></tr>';
                paymentModal.show();

                // Build invoice HTML from cart
                let html = '';
                cart.forEach(item => {
                    const packQty = item.packQty > 0 ? item.packQty : 1;
                    const unitPrice = item.price / packQty;
                    const lineTotal = Math.round(unitPrice * item.qty);
                    html += `
                        <tr>
                            <td><span class="badge bg-info text-dark">${item.type}</span></td>
                            <td><strong>${item.name}</strong></td>
                            <td class="text-end">${formatMK(unitPrice)}</td>
                            <td class="text-end">${item.qty}</td>
                            <td class="text-end">${formatMK(lineTotal)}</td>
                        </tr>
                    `;
                });
                document.getElementById('invoiceItemsBody').innerHTML = html;
                document.getElementById('invTotal').textContent = formatMK(retailTotal);
            } else {
                alert('Error: ' + data.error);
            }
        })
        .catch(err => {
            console.error(err);
            alert('Network error. Could not create sale.');
        });
    });

    // Rounds retailTotal (the raw sale total, in tambala) to the nearest
    // selected MK value. "0" means no rounding.
    function getRoundedBaseTotal() {
        const roundTo = parseInt(document.getElementById('roundingSelect').value, 10) || 0;
        if (roundTo <= 0) return retailTotal;
        const roundToTambala = roundTo * 100;
        return Math.round(retailTotal / roundToTambala) * roundToTambala;
    }

    function updateRoundedTotalDisplay() {
        const rounded = getRoundedBaseTotal();
        document.getElementById('roundedTotalDisplay').value = 'MK ' + (rounded / 100).toFixed(2);
        document.getElementById('modalTotalFee').textContent = 'MK ' + (rounded / 100).toFixed(2);
        document.getElementById('fullAmountDisplay').textContent = 'MK ' + (getFinalTotal() / 100).toFixed(2);
        updateLoanRemaining();
    }

    document.getElementById('roundingSelect').addEventListener('change', updateRoundedTotalDisplay);

    function togglePaymentMode(mode) {
        document.getElementById('fullPaymentInfo').style.display = mode === 'full' ? 'block' : 'none';
        document.getElementById('partialPaymentFields').style.display = mode === 'partial' ? 'block' : 'none';

        if (mode === 'partial') {
            document.getElementById('loanAmount').addEventListener('input', updateLoanRemaining);
            updateLoanRemaining();
        } else {
            document.getElementById('loanAmount').removeEventListener('input', updateLoanRemaining);
        }
    }

    // Discount amount always live-updates the full-payment display
    document.getElementById('discountAmount').addEventListener('input', function() {
        document.getElementById('fullAmountDisplay').textContent = 'MK ' + (getFinalTotal() / 100).toFixed(2);
        updateLoanRemaining();
    });

    function updateLoanRemaining() {
        const paid = parseFloat(document.getElementById('loanAmount').value) || 0;
        const remaining = Math.max(0, getFinalTotal() / 100 - paid);
        document.getElementById('loanRemainingDisplay').textContent = 'MK ' + remaining.toFixed(2);
    }

    document.querySelectorAll('input[name="payMode"]').forEach(radio => {
        radio.addEventListener('change', function() {
            togglePaymentMode(this.value);
        });
    });

    // Payment Channel Logic
    document.getElementById('paymentChannel').addEventListener('change', function() {
        const val = this.value;
        const refLabel = document.getElementById('refLabel');
        const refInput = document.getElementById('paymentReference');
        const refWrapper = document.getElementById('refFieldWrapper');
        const medAidFields = document.getElementById('medicalAidFields');
        
        if (val === 'Airtel Money' || val === 'TNM Mpamba') {
            refWrapper.style.display = 'block';
            refLabel.textContent = 'Phone Number / Agent Code';
            refInput.placeholder = 'e.g. 0991234567';
            medAidFields.style.display = 'none';
        } else if (val === 'Bank Transfer') {
            refWrapper.style.display = 'block';
            refLabel.textContent = 'Account Number';
            refInput.placeholder = 'e.g. 1234567890';
            medAidFields.style.display = 'none';
        } else if (val === 'Cheque') {
            refWrapper.style.display = 'block';
            refLabel.textContent = 'Cheque Number';
            refInput.placeholder = 'e.g. 001234';
            medAidFields.style.display = 'none';
        } else if (val === 'Medical Aid') {
            refWrapper.style.display = 'none';
            refInput.value = '';
            medAidFields.style.display = 'block';
        } else {
            refWrapper.style.display = 'none';
            refInput.value = '';
            medAidFields.style.display = 'none';
        }
    });

    // 1. Calculate the final total: round first, then apply discount
    function getFinalTotal() {
        const discountAmt = parseFloat(document.getElementById('discountAmount').value) * 100 || 0;
        return Math.max(0, getRoundedBaseTotal() - discountAmt);
    }

    // 2. CONFIRM PAYMENT HANDLER (Re-written to avoid duplicate events)
    document.getElementById('confirmPaymentBtn').addEventListener('click', function() {
        const isFull = document.querySelector('input[name="payMode"]:checked').value === 'full';
        const finalTotal = getFinalTotal();
        
        const discountAmt = parseFloat(document.getElementById('discountAmount').value) * 100 || 0;
        const discountReason = document.getElementById('discountReason').value.trim();

        if (discountAmt > 0 && !discountReason) {
            alert('Please enter a reason for the discount.');
            return;
        }

        const roundTo = parseInt(document.getElementById('roundingSelect').value, 10) || 0;

        const payload = { 
            payment_mode: isFull ? 'full' : 'loan',
            payment_channel: document.getElementById('paymentChannel').value,
            payment_reference: document.getElementById('paymentReference').value.trim() || null,
            medical_aid_company: document.getElementById('medicalAidCompany').value.trim() || null,
            discount_amount: discountAmt,
            discount_reason: discountReason || null,
            round_to: roundTo || null,
            rounded_total: roundTo ? getRoundedBaseTotal() : null
        };

        if (isFull) {
            payload.amount_paid = finalTotal;
        } else {
            const amountPaid = parseFloat(document.getElementById('loanAmount').value) * 100 || 0;
            const witness = document.getElementById('loanWitness').value;
            const dueDate = document.getElementById('loanDueDate').value;

            if (!amountPaid || amountPaid <= 0) {
                alert('Please enter a valid payment amount for the loan.');
                return;
            }
            if (amountPaid >= finalTotal) {
                alert('If paying the full amount, please select "Pay Full Amount" instead.');
                return;
            }
            if (!witness) {
                alert('Witness is required for partial payments/loans.');
                return;
            }
            payload.amount_paid = amountPaid;
            payload.witness_id = witness;
            payload.loan_due_date = dueDate || null;
        }

        const btn = this;
        btn.disabled = true;
        btn.textContent = 'Processing...';

        if (!retailVisitId) {
            alert('Error: Visit ID is missing. Please add items and try again.');
            btn.disabled = false;
            btn.textContent = '✅ Confirm & Complete';
            return;
        }

        fetch('/cashier/process/' + retailVisitId, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                document.getElementById('paymentModal').querySelector('.btn-close').click();
                location.reload();
            } else {
                alert('Error: ' + (data.error || 'Failed to process payment.'));
                btn.disabled = false;
                btn.textContent = '✅ Confirm & Complete';
            }
        })
        .catch(err => {
            console.error(err);
            alert('Network error. Please try again.');
            btn.disabled = false;
            btn.textContent = '✅ Confirm & Complete';
        });
    });

    document.getElementById('paymentModal').addEventListener('hidden.bs.modal', function() {
        const btn = document.getElementById('confirmPaymentBtn');
        btn.disabled = false;
        btn.textContent = '✅ Confirm & Complete';
    });
});
</script>
{% endblock %}
