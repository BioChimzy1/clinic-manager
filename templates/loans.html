{% extends 'layout.html' %}
{% block content %}
<div class="row">
    <div class="col-12">
        <div class="d-flex justify-content-between align-items-center mb-3 border-bottom pb-2">
            <div>
                <h3 class="mb-0">💳 Loans</h3>
                <small class="text-muted">Everyone with an active loan, from a consultation or a retail sale.</small>
            </div>
            <span class="badge bg-dark fs-6" id="loanCountBadge">Loading...</span>
        </div>

        <div class="mb-3">
            <input type="text" id="loanSearchInput" class="form-control" placeholder="🔍 Search by patient name..." autocomplete="off">
        </div>

        <div id="noResultsMsg" class="text-center text-muted py-4" style="display: none;">
            No loans match your search.
        </div>

        <div class="table-responsive">
            <table class="table table-striped table-hover align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>Patient</th>
                        <th class="text-end">Total (MK)</th>
                        <th class="text-end">Paid (MK)</th>
                        <th class="text-end">Balance (MK)</th>
                        <th>Witness</th>
                        <th>Due Date</th>
                        <th class="text-end">Action</th>
                    </tr>
                </thead>
                <tbody id="loansTableBody">
                    <!-- Rendered by JS from /api/loans, same pattern as queue.html -->
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="{{ url_for('static', filename='js/outbox.js') }}"></script>
<script>
document.addEventListener('DOMContentLoaded', function () {
    loadLoans();
    window.addEventListener('online', loadLoans);

    const searchInput = document.getElementById('loanSearchInput');
    searchInput.addEventListener('input', function () {
        applySearch(this.value.trim().toLowerCase());
    });
});

async function loadLoans() {
    try {
        const res = await fetch('/api/loans');
        if (!res.ok) throw new Error('bad response');
        const data = await res.json();
        renderLoans(data);
    } catch (err) {
        document.getElementById('loanCountBadge').textContent = 'Unable to load';
        document.getElementById('loansTableBody').innerHTML =
            '<tr><td colspan="7" class="text-center text-muted py-4">Unable to load loans. Check your connection.</td></tr>';
    }
}

function renderLoans(data) {
    const loans = data.loans || [];
    const tbody = document.getElementById('loansTableBody');
    const countBadge = document.getElementById('loanCountBadge');

    countBadge.textContent = `${loans.length} ${loans.length === 1 ? 'loan' : 'loans'} active`;

    if (loans.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted py-4">No active loans right now. 🎉</td></tr>';
        return;
    }

    tbody.innerHTML = loans.map(renderLoanRow).join('');
    applySearch(document.getElementById('loanSearchInput').value.trim().toLowerCase());
}

function renderLoanRow(loan) {
    const displayName = loan.patient_name || '🏪 Retail Sale';
    const typeBadge = loan.is_retail
        ? '<span class="badge bg-success ms-1">Retail</span>'
        : '<span class="badge bg-primary ms-1">Consultation</span>';

    const dueCell = loan.due_date
        ? `<small class="${loan.is_overdue ? 'text-danger fw-bold' : 'text-muted'}">${cmEscapeHtml(loan.due_date)}${loan.is_overdue ? ' (overdue)' : ''}</small>`
        : '<small class="text-muted">No due date</small>';

    return `
        <tr data-name="${cmEscapeHtml((loan.patient_name || '🏪 retail sale').toLowerCase())}">
            <td><strong>${cmEscapeHtml(displayName)}</strong>${typeBadge}</td>
            <td class="text-end">${(loan.total_fee / 100).toFixed(2)}</td>
            <td class="text-end">${(loan.amount_paid / 100).toFixed(2)}</td>
            <td class="text-end text-danger fw-bold">${(loan.balance / 100).toFixed(2)}</td>
            <td><small>${cmEscapeHtml(loan.witness || '—')}</small></td>
            <td>${dueCell}</td>
            <td class="text-end">
                <a href="/cashier/loan/${loan.id}" class="btn btn-outline-info btn-sm">💳 View / Record Payment</a>
            </td>
        </tr>
    `;
}

function applySearch(query) {
    const rows = document.querySelectorAll('#loansTableBody tr[data-name]');
    const noResultsMsg = document.getElementById('noResultsMsg');
    let visibleCount = 0;

    rows.forEach((row) => {
        const matches = row.getAttribute('data-name').includes(query);
        row.style.display = matches ? '' : 'none';
        if (matches) visibleCount++;
    });

    noResultsMsg.style.display = (visibleCount === 0 && query.length > 0) ? 'block' : 'none';
}
</script>
{% endblock %}
