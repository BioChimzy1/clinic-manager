{% extends 'layout.html' %}
{% block content %}
<div class="row mx-auto" style="max-width: 600px;">
    <div class="col-12">
        <div class="text-center mb-4">
            <h2 class="text-success">🏥 Welcome to ClinicManager!</h2>
            <p class="text-muted">It looks like this is your first time here. Let's set up your clinic.</p>
        </div>
        
        <div class="card shadow-sm">
            <div class="card-header bg-dark text-white">
                <h5 class="mb-0">Create Your Clinic</h5>
            </div>
            <div class="card-body">
                <form action="/setup_clinic" method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Clinic Name <span class="text-danger">*</span></label>
                        <input type="text" name="clinic_name" class="form-control" placeholder="e.g. Mwai Clinic" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Phone Number</label>
                        <input type="text" name="phone" class="form-control" placeholder="e.g. 0992528659">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Email Address</label>
                        <input type="email" name="email" class="form-control" placeholder="e.g. clinic@gmail.com">
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label fw-bold">Clinic Address</label>
                        <input type="text" name="address" class="form-control" placeholder="e.g. Mkwalula, Lilongwe">
                    </div>
                    
                    <button type="submit" class="btn btn-success w-100">🏥 Create Clinic & Start Managing</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
